<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="2026年第9号台风巴威（BAVI）实时路径追踪：多机构预报对比、城市波及倒计时、应对指南。提前预防，减少灾情影响。" />
  <meta name="keywords" content="台风巴威,BAVI,台风路径,实时台风,台风预报,防台风,台风倒计时" />
  <title>台风巴威实时追踪 · 波及倒计时与应对指南</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="台风巴威 BAVI 实时追踪 · 你的城市还有多久被波及？" />
  <meta property="og:description" content="实时路径 + 多家官方机构预报对比 + 城市波及倒计时 + 防台应对指南。转发给你关心的人，提前准备。" />
  <meta property="og:url" content="https://chinaupdated.com/" />
  <meta property="og:image" content="https://chinaupdated.com/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://chinaupdated.com/og.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://webst01.is.autonavi.com" />
  <link rel="preconnect" href="https://webst02.is.autonavi.com" />
  <link rel="preload" href="/api/typhoon/202609" as="fetch" crossorigin />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23ff3131' stroke-width='3' stroke-dasharray='14 7' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23ff3131'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="map"></div>

  <!-- 顶部标题条 -->
  <header id="topbar">
    <div class="brand">
      <span class="brand-eye" aria-hidden="true"></span>
      <div class="brand-text">
        <h1>台风巴威 <span class="en">BAVI</span></h1>
        <p class="sub">2026 年第 9 号台风 · 实时路径追踪</p>
      </div>
    </div>
    <div class="topbar-right">
      <div id="music-bar" role="region" aria-label="背景音乐版权">
        <span class="mb-track">《宫花红》赤星版</span>
        <span class="mb-sep" aria-hidden="true">·</span>
        <a class="mb-link" href="https://space.bilibili.com/343786927" target="_blank" rel="noopener">@北极星电台</a>
        <span class="mb-sep" aria-hidden="true">·</span>
        <a class="mb-link" href="https://www.bilibili.com/video/BV148Ms6MET9/" target="_blank" rel="noopener">作者碎碎念</a>
      </div>
      <button id="btn-music" type="button" aria-label="播放背景音乐《宫花红》赤星版" aria-pressed="false" title="背景音乐《宫花红》赤星版 · @北极星电台（已获授权）">
        <svg class="icon-play" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button id="btn-share" aria-label="扫码转发">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M3 3h8v2H5v6H3V3zm10 0h8v8h-2V5h-6V3zM3 13h2v6h6v2H3v-8zm16 0h2v8h-8v-2h6v-6zM11 11h2v2h-2z"/></svg>
        扫码转发
      </button>
      <div class="datastamp" id="datastamp">正在连接数据源…</div>
    </div>
  </header>

  <!-- 移动端常驻实况条（小屏时由 mobile 布局注入 HUD 统计块） -->
  <div id="mstats"></div>

  <!-- 左侧 HUD 信息面板 -->
  <aside id="hud" aria-label="台风实时状态">
    <button id="hud-close" aria-label="收起面板，查看完整地图" title="收起面板，查看完整地图">
      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.4 5.6 9 12l6.4 6.4L14 19.8 6.2 12 14 4.2z"/></svg>
    </button>
    <div id="hud-stats">
      <div class="hud-badge-row">
        <span class="intensity-badge" id="hud-badge">—</span>
        <span class="live-dot" id="live-dot" title="实况更新中"></span>
      </div>
      <div class="stat-grid">
        <div class="stat"><label>中心风速</label><b id="s-speed">—</b><small>m/s</small></div>
        <div class="stat"><label>中心气压</label><b id="s-pressure">—</b><small>hPa</small></div>
        <div class="stat"><label>风力等级</label><b id="s-power">—</b><small id="s-power-unit">级</small></div>
        <div class="stat"><label>移动</label><b id="s-move">—</b><small id="s-move-unit">km/h</small></div>
      </div>
      <div class="pos-row" id="s-pos">—</div>
    </div>

    <div class="hud-section" id="sec-impact">
      <h2>城市波及倒计时</h2>
      <div id="impact-list" class="impact-list"></div>
      <button id="btn-guide" class="guide-cta" type="button">现在该做什么 →</button>
    </div>

    <div class="hud-section" id="sec-agency">
      <h2>预报机构对比</h2>
      <div id="agency-list" class="agency-list"></div>
    </div>

    <div class="hud-section" id="sec-legend">
      <h2>强度等级</h2>
      <div id="legend" class="legend"></div>
    </div>

    <div class="hud-foot" id="hud-foot">数据来源加载中…</div>
    <div class="hud-links" id="hud-links">
      <a href="https://github.com/Trade-Offf/typhoon-bavi-tracker" target="_blank" rel="noopener">GitHub 开源 · 欢迎共建</a>
      <a href="http://typhoon.nmc.cn/web.html" target="_blank" rel="noopener">中央气象台官方</a>
      <a href="https://www.bilibili.com/video/BV148Ms6MET9/" target="_blank" rel="noopener">作者碎碎念</a>
      <a href="https://space.bilibili.com/343786927" target="_blank" rel="noopener">背景音乐《宫花红》赤星版 · @北极星电台（已授权）</a>
      <button type="button" id="btn-origin" class="hud-link-btn">聊聊初心 →</button>
      <span>断网也能看倒计时与应急指南</span>
      <span>信息仅供参考，请以官方预警为准</span>
    </div>
  </aside>
  <button id="hud-open" aria-label="展开实况面板">
    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8.6 5.6 15 12l-6.4 6.4L10 19.8l7.8-7.8L10 4.2z"/></svg>
    <span>实况</span>
  </button>

  <!-- 正能量文案轮播 -->
  <div id="slogan" aria-live="polite">
    <span class="slogan-mark" aria-hidden="true"></span>
    <span id="slogan-text">风雨同舟，守望相助</span>
  </div>

  <!-- 右侧信息抽屉（移动端为底部抽屉） -->
  <aside id="drawer" class="open" aria-label="资讯与应对指南">
    <button id="drawer-handle" type="button" aria-label="拖动调整面板高度"><span></span></button>
    <div class="drawer-tabs" role="tablist">
      <button class="drawer-tab active" data-panel="news" role="tab" aria-selected="true" aria-controls="panel-news">实时资讯</button>
      <button class="drawer-tab" data-panel="guide" role="tab" aria-selected="false" aria-controls="panel-guide">应对指南</button>
      <button id="drawer-close" aria-label="收起面板">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M8.6 5.6 15 12l-6.4 6.4L10 19.8l7.8-7.8L10 4.2z"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <section id="panel-news" class="drawer-panel active" role="tabpanel">
        <div class="news-meta" id="news-meta">正在聚合最新资讯…</div>
        <div id="news-list" class="news-list"></div>
        <a class="xhs-link" href="https://www.xiaohongshu.com/search_result?keyword=%E5%8F%B0%E9%A3%8E%E5%B7%B4%E5%A8%81" target="_blank" rel="noopener">
          在小红书查看 #台风巴威 现场图文 →
        </a>
      </section>
      <section id="panel-guide" class="drawer-panel" role="tabpanel"></section>
    </div>
  </aside>
  <button id="drawer-open" aria-label="展开资讯面板">
    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.4 5.6 9 12l6.4 6.4L14 19.8 6.2 12 14 4.2z"/></svg>
    <span>资讯</span>
  </button>

  <!-- 底部时间轴 -->
  <div id="timeline" aria-label="路径回放控制">
    <button id="btn-play" class="play-btn" aria-label="播放/暂停">
      <svg viewBox="0 0 24 24" class="icon-play"><path d="M8 5v14l11-7z"/></svg>
      <svg viewBox="0 0 24 24" class="icon-pause"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <div class="scrub-wrap">
      <input type="range" id="scrubber" min="0" max="1000" value="1000" step="1" aria-label="时间轴" />
      <div class="scrub-labels"><span id="t-start">—</span><span id="t-current">—</span><span id="t-end">—</span></div>
    </div>
    <div class="speed-group" role="group" aria-label="回放速度">
      <button data-speed="3" class="speed-btn">1×</button>
      <button data-speed="6" class="speed-btn active">2×</button>
      <button data-speed="12" class="speed-btn">4×</button>
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loading">
    <div class="spinner" aria-hidden="true"></div>
    <p>正在获取「巴威」实时观测数据…</p>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
